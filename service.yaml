apiVersion: v1
kind: Service
metadata:
  name: react-k8s-app-lb-svc
  labels:
    app: my-app
spec:
  type: LoadBalancer
  selector:
    app: react-k8s-app
  ports:
    - protocol: TCP
      port: 80          # Port exposed by the LoadBalancer
      targetPort: 8080  # Port the app container is listening on
